name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:
  schedule:
    # Every day at 10:17 Asia/Shanghai.
    - cron: '17 2 * * *'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          PROJECTS_API_URL: https://playground2.z.wiki/api/projects
          PROJECTS_API_TOKEN: ${{ secrets.PROJECTS_API_TOKEN }}

      - name: Commit generated root site if changed
        run: |
          git add -A index.html assets robots.txt sitemap.xml src/data/projects.generated.json .nojekyll
          if git diff --cached --quiet; then
            echo "No generated site changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Refresh generated site"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
